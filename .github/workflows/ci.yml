name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

# Cancel in-progress runs when a new workflow with the same group name is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Setup - shared dependencies cached for all jobs
  setup:
    name: Setup Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        id: bun-cache
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        if: steps.bun-cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      # Extract Playwright version from package.json for precise cache key
      # Only invalidates when Playwright itself is updated, not other deps
      - name: Get Playwright version
        id: playwright-version
        run: |
          VERSION=$(jq -r '.devDependencies.playwright // .dependencies.playwright // "unknown"' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Playwright version: $VERSION"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium firefox webkit

  # Job 2: Fast checks (no Playwright needed)
  checks:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run type check
        run: bun run typecheck

      - name: Run Oxlint
        run: bun run lint

      - name: Run type-aware Oxlint
        run: bun run lint:type-aware

      - name: Check formatting
        run: bun run format:check

      - name: Check documentation quality
        run: bun run docs:check

  # Job 3: Build
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build

      - name: Check bundle size
        run: bun run size

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .output
          retention-days: 7

  # Job 4: All browser tests (consolidated for efficiency)
  test-browsers:
    name: Browser Tests
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Extract Playwright version for precise cache key (same as setup job)
      - name: Get Playwright version
        id: playwright-version
        run: |
          VERSION=$(jq -r '.devDependencies.playwright // .dependencies.playwright // "unknown"' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Restore Playwright cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers (if not cached)
        run: bunx playwright install --with-deps chromium firefox webkit

      - name: Run unit tests
        run: bun run test:unit

      - name: Run component tests
        run: bun run test:component

      # Visual regression tests are skipped in CI due to cross-platform rendering differences
      # macOS and Linux render fonts differently, causing dimension mismatches
      # Run visual tests locally: bun run test:visual
      # To update screenshots: bun run test:visual:update
      # - name: Run visual regression tests
      #   run: bun run test:visual

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
            **/*-actual.png
            **/*-diff.png
          retention-days: 7

  # Job 5: Security Audit (optional, doesn't block)
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 5
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run security audit
        run: bun audit || true

  # Job 6: All checks passed
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [checks, build, test-browsers]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.checks.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.test-browsers.result }}" != "success" ]; then
            echo "❌ One or more CI checks failed"
            exit 1
          fi
          echo "✅ All CI checks passed!"
